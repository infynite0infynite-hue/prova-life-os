kind = "mobile"
previewPath = "/"
title = "ProvaLife OS"
version = "1.0.0"
id = "artifacts/prova-life-os"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22600

[services.development]
run = "pnpm --filter @workspace/prova-life-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prova-life-os", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/prova-life-os", "run", "serve" ]

[services.env]
PORT = "22600"
BASE_PATH = "/"
